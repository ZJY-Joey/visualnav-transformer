dataset:
  input_dir: /path/to/recon_dataset
  output_dir: datasets/recon_action_z
  num_trajs: -1
  export_images: true
  save_dataset: true

sampling:
  horizon: 4
  discount: 0.9

thresholds:
  linear_velocity_cmd_min: 0.05
  angular_velocity_cmd_min: 0.05
  position_expected_min: 0.05
  yaw_position_expected_min: 0.05

constants:
  position_command_scale: 1.0
  yaw_command_scale: 1.0

epsilons:
  velocity: 1.0e-6
  angular_velocity: 1.0e-6
  position: 1.0e-6
  yaw_position: 1.0e-6

clips:
  vel_term_max: 5.0
  angvel_term_max: 5.0
  pos_term_max: 5.0
  yawpos_term_max: 5.0
  z_step_max: 10.0

weights:
  linear_velocity: 1.0
  angular_velocity: 0.5
  position: 0.1
  yaw_position: 0.2

report:
  quantiles: [0.5, 0.9, 0.95, 0.99]
  summary_path: datasets/recon_action_z_summary.yaml
  plot_path: datasets/recon_action_z_terms.png
